<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Route Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green: #2d6a2d;
    --green-light: #3d8c3d;
    --green-pale: #e8f5e8;
    --green-mid: #c5e5c5;
    --amber: #e07b00;
    --amber-pale: #fff3e0;
    --surface: #f7f9f7;
    --card: #ffffff;
    --text: #1a2e1a;
    --text-muted: #6b8a6b;
    --border: #d4e8d4;
    --shadow: 0 2px 8px rgba(45,106,45,0.10);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 24px);
  }

  .header {
    background: #1a1a1a;
    color: white;
    padding: 16px 16px 0;
    padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-icon { font-size: 22px; }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .week-badge {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: background 0.2s;
  }
  .week-badge:active { background: rgba(255,255,255,0.35); }

  .refresh-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
    color: white;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.35); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .day-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border: none;
    background: transparent;
    position: relative;
  }
  .day-tab.active { background: white; color: var(--green); }
  .day-tab .tab-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.25);
    color: white;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    margin-left: 4px;
  }
  .day-tab.active .tab-count { background: var(--green-pale); color: var(--green); }
  .day-tab .done-dot {
    position: absolute;
    top: -2px; right: -2px;
    width: 8px; height: 8px;
    background: #4CAF50;
    border-radius: 50%;
    border: 1.5px solid var(--green);
    display: none;
  }
  .day-tab.has-done .done-dot { display: block; }

  .main { padding: 16px; max-width: 520px; margin: 0 auto; }

  /* LOADING STATE */
  .loading-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--green-mid);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  .loading-text { font-size: 15px; font-weight: 500; }
  .loading-sub { font-size: 13px; margin-top: 6px; color: var(--text-muted); }

  /* ERROR STATE */
  .error-state {
    background: #fff3f3;
    border: 1.5px solid #ffcdd2;
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin-top: 24px;
  }
  .error-icon { font-size: 32px; margin-bottom: 8px; }
  .error-title { font-size: 15px; font-weight: 700; color: #c0392b; margin-bottom: 6px; }
  .error-msg { font-size: 13px; color: #888; line-height: 1.5; }
  .retry-btn {
    margin-top: 14px;
    padding: 10px 24px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* LAST UPDATED */
  .last-updated {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    padding: 0 16px 10px;
    font-family: 'DM Mono', monospace;
  }

  .stop-counter {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .stop-count-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .progress-text { font-size: 13px; font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }

  .stop-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: var(--shadow);
  }
  .stop-card.done { opacity: 0.55; border-color: var(--green-mid); background: var(--green-pale); }
  .stop-card.has-notes { border-left: 4px solid var(--amber); }
  .stop-card.done.has-notes { border-left-color: var(--green-light); }

  .stop-main { display: flex; align-items: flex-start; padding: 14px; gap: 12px; }

  .check-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--border);
    background: white;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }
  .check-btn:active { transform: scale(0.88); }
  .check-btn.checked { background: var(--green-light); border-color: var(--green-light); }
  .check-btn svg { width: 14px; height: 14px; stroke: white; fill: none; opacity: 0; transition: opacity 0.15s; }
  .check-btn.checked svg { opacity: 1; }

  .stop-info { flex: 1; min-width: 0; }
  .stop-number { font-size: 10px; font-weight: 700; color: var(--text-muted); font-family: 'DM Mono', monospace; letter-spacing: 0.5px; margin-bottom: 2px; }
  .stop-address { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
  .stop-card.done .stop-address { text-decoration: line-through; color: var(--text-muted); }
  .stop-customer { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .stop-actions { display: flex; gap: 6px; padding: 0 14px 14px; margin-top: -4px; }
  .action-btn {
    flex: 1;
    padding: 8px 0;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all 0.15s;
    text-decoration: none;
  }
  .action-btn:active { background: var(--green-pale); transform: scale(0.97); }
  .action-btn span { font-size: 14px; }

  .notes-banner {
    margin: 0 14px 14px;
    background: var(--amber-pale);
    border: 1.5px solid #f5c06b;
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .notes-banner .note-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .notes-banner .note-text { font-size: 13px; font-weight: 500; color: #7a4500; line-height: 1.4; }
  .stop-card.done .notes-banner { background: var(--green-pale); border-color: var(--green-mid); }
  .stop-card.done .notes-banner .note-text { color: var(--text-muted); }

  /* WEEK PICKER */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .week-sheet {
    background: white;
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 20px 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 70vh;
    overflow-y: auto;
  }
  .overlay.open .week-sheet { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .sheet-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
  .week-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    border: 1.5px solid transparent;
  }
  .week-option:active { background: var(--green-pale); }
  .week-option.selected { border-color: var(--green); background: var(--green-pale); }
  .week-option-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .week-option-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .week-check { font-size: 18px; color: var(--green); display: none; }
  .week-option.selected .week-check { display: block; }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; font-weight: 500; }

  .reset-btn {
    display: block; width: 100%; padding: 12px;
    margin-top: 16px;
    border-radius: var(--radius-sm);
    border: 1.5px dashed var(--border);
    background: transparent;
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .reset-btn:active { background: var(--green-pale); color: var(--green); }
</style>
</head>

<script>
const SHEET_CSV_URL = 'https://script.google.com/macros/s/AKfycby3gcwOdlEA_odF1uTCaMF8iUwQ2dDe9k66mCO09LoWgw2gP0LnTOctaXTgG7a08g08Fw/exec';

// State
let allWeeks = {};   // { weekName: { DAY: [stops] } }
let weekOrder = [];
let currentWeekIdx = 0;
let currentDay = null;
let done = {};
let lastFetched = null;

// ── Storage ──────────────────────────────────────────
function loadDone() {
  try { done = JSON.parse(localStorage.getItem('routeDone') || '{}'); } catch(e) { done = {}; }
}
function saveDone() {
  try { localStorage.setItem('routeDone', JSON.stringify(done)); } catch(e) {}
}
function getKey(w, d, i) { return `${w}||${d}||${i}`; }

// ── CSV Parser ────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    // Handle quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const row = {};
    headers.forEach((h, i) => row[h] = (cols[i] || '').replace(/^"|"$/g, '').trim());
    return row;
  }).filter(r => r.Address && r.Address.length > 0);
}

function buildWeeks(rows) {
  const weeks = {};
  const order = [];
  const dayOrder = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','CLEANUPS'];

  rows.forEach(r => {
    const week = r.Week || 'Unknown';
    const day = (r.Day || '').toUpperCase().trim();
    if (!day || !week) return;
    if (!weeks[week]) { weeks[week] = {}; order.push(week); }
    if (!weeks[week][day]) weeks[week][day] = [];
    weeks[week][day].push({
      address: r.Address || '',
      notes: r.Notes || '',
      customer: r.Customer || '',
      phone: r.Phone || ''
      // Price intentionally excluded from app
    });
  });

  // Remove duplicates in order
  const seen = new Set();
  const uniqueOrder = order.filter(w => { if (seen.has(w)) return false; seen.add(w); return true; });

  return { weeks, order: uniqueOrder };
}

// ── Fetch ─────────────────────────────────────────────
async function fetchData(manual = false) {
  const refreshBtn = document.querySelector('.refresh-btn');
  if (refreshBtn) refreshBtn.classList.add('spinning');

  if (!manual && Object.keys(allWeeks).length > 0) {
    // Already loaded, just re-render
    if (refreshBtn) refreshBtn.classList.remove('spinning');
    return;
  }

  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length === 0) throw new Error('No data found in sheet');

    const { weeks, order } = buildWeeks(rows);
    allWeeks = weeks;
    weekOrder = order;
    lastFetched = new Date();

    // Default to most recent week (first in list)
    currentWeekIdx = 0;
    currentDay = null;

    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('stopList').style.display = 'block';

    renderAll();
  } catch (err) {
    console.error(err);
    document.getElementById('mainContent').innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Couldn't load routes</div>
        <div class="error-msg">Make sure your Google Sheet is published and the URL is correct.<br><br>Error: ${err.message}</div>
        <button class="retry-btn" onclick="fetchData(true)">Try Again</button>
      </div>`;
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('stopList').style.display = 'none';
  }

  if (refreshBtn) refreshBtn.classList.remove('spinning');
}

// ── Helpers ───────────────────────────────────────────
function getWeekName() { return weekOrder[currentWeekIdx] || 'Week'; }

function getWeekDays(wIdx) {
  const dayOrder = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','CLEANUPS'];
  const days = allWeeks[weekOrder[wIdx]] || {};
  return dayOrder.filter(d => days[d] && days[d].length > 0);
}

function getStops(wIdx, day) {
  return (allWeeks[weekOrder[wIdx]] || {})[day] || [];
}

function getDoneCount(wIdx, day) {
  return getStops(wIdx, day).filter((_, i) => done[getKey(weekOrder[wIdx], day, i)]).length;
}

// ── Render ────────────────────────────────────────────
function renderAll() {
  const days = getWeekDays(currentWeekIdx);
  if (!currentDay || !days.includes(currentDay)) currentDay = days[0] || null;
  renderHeader();
  renderTabs();
  renderStops();
}

function renderHeader() {
  document.getElementById('weekLabel').textContent = getWeekName();
  if (lastFetched) {
    document.getElementById('lastUpdated').textContent =
      `Last synced ${lastFetched.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
  }
}

function renderTabs() {
  const days = getWeekDays(currentWeekIdx);
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = days.map(d => {
    const stops = getStops(currentWeekIdx, d);
    const doneCount = getDoneCount(currentWeekIdx, d);
    return `<button class="day-tab${d === currentDay ? ' active' : ''}${doneCount > 0 ? ' has-done' : ''}" onclick="selectDay('${d}')">
      ${d.charAt(0) + d.slice(1).toLowerCase()}
      <span class="tab-count">${stops.length}</span>
      <span class="done-dot"></span>
    </button>`;
  }).join('');
}

function renderStops() {
  const stops = currentDay ? getStops(currentWeekIdx, currentDay) : [];
  const list = document.getElementById('stopList');

  if (!stops.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">No stops for this day</div></div>`;
    return;
  }

  const weekName = getWeekName();
  const doneCount = getDoneCount(currentWeekIdx, currentDay);
  const total = stops.length;

  let html = `<div class="stop-counter">
    <span class="stop-count-label">${total} stop${total !== 1 ? 's' : ''} today</span>
    <span class="progress-text">${doneCount}/${total} done</span>
  </div>`;

  stops.forEach((s, i) => {
    const key = getKey(weekName, currentDay, i);
    const isDone = !!done[key];
    const hasNotes = !!s.notes;
    const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(s.address + ', Wichita, KS')}`;
    const phoneDigits = s.phone ? s.phone.replace(/[^0-9]/g, '') : '';

    html += `<div class="stop-card${isDone ? ' done' : ''}${hasNotes ? ' has-notes' : ''}" id="card-${i}">
      <div class="stop-main">
        <button class="check-btn${isDone ? ' checked' : ''}" onclick="toggleDone(${i})" aria-label="Mark done">
          <svg viewBox="0 0 14 14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,7 5.5,10.5 12,3"/>
          </svg>
        </button>
        <div class="stop-info">
          <div class="stop-number">STOP ${i + 1}</div>
          <div class="stop-address">${s.address}</div>
          ${s.customer ? `<div class="stop-customer">👤 ${s.customer}</div>` : ''}
        </div>
      </div>
      ${hasNotes ? `<div class="notes-banner">
        <span class="note-icon">⚠️</span>
        <span class="note-text">${s.notes.replace(/\|/g, ' • ')}</span>
      </div>` : ''}
      <div class="stop-actions">
        <a class="action-btn" href="${mapsUrl}" target="_blank"><span>📍</span> Navigate</a>
        ${phoneDigits.length >= 7 ? `<a class="action-btn" href="tel:${phoneDigits}"><span>📞</span> ${s.phone}</a>` : ''}
      </div>
    </div>`;
  });

  if (doneCount > 0) {
    html += `<button class="reset-btn" onclick="resetDay()">↺ Reset ${currentDay.charAt(0)+currentDay.slice(1).toLowerCase()}'s checkmarks</button>`;
  }

  list.innerHTML = html;
}

// ── Actions ───────────────────────────────────────────
function toggleDone(idx) {
  const key = getKey(getWeekName(), currentDay, idx);
  done[key] = !done[key];
  saveDone();
  renderTabs();
  renderStops();
}

function resetDay() {
  const stops = getStops(currentWeekIdx, currentDay);
  stops.forEach((_, i) => { delete done[getKey(getWeekName(), currentDay, i)]; });
  saveDone();
  renderTabs();
  renderStops();
}

function selectDay(day) {
  currentDay = day;
  renderTabs();
  renderStops();
  window.scrollTo(0, 0);
}

function openWeekPicker() {
  const opts = document.getElementById('weekOptions');
  opts.innerHTML = weekOrder.map((w, i) => {
    const days = getWeekDays(i);
    const totalStops = days.reduce((sum, d) => sum + getStops(i, d).length, 0);
    return `<div class="week-option${i === currentWeekIdx ? ' selected' : ''}" onclick="selectWeek(${i})">
      <div>
        <div class="week-option-label">Week of ${w}</div>
        <div class="week-option-sub">${days.length} days · ${totalStops} stops</div>
      </div>
      <span class="week-check">✓</span>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeWeekPicker() {
  document.getElementById('overlay').classList.remove('open');
}

function selectWeek(idx) {
  currentWeekIdx = idx;
  currentDay = null;
  closeWeekPicker();
  renderAll();
}

// ── Init ──────────────────────────────────────────────
loadDone();
fetchData();
</script>
</body>
</html>
